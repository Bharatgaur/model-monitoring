# =============================================================
#  Prometheus Configuration
#  File: prometheus.yml
#  Purpose: Tell Prometheus WHERE to scrape metrics from
# =============================================================

global:
  scrape_interval:     15s   # Scrape every 15 seconds
  evaluation_interval: 15s   # Evaluate alert rules every 15s
  scrape_timeout:      10s   # Timeout for each scrape

# Alert rules file (for model drift / error rate alerts)
rule_files:
  - "alert_rules.yml"

# Alertmanager config (optional - for email/Slack notifications)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['localhost:9093']

# ── Scrape Configurations ─────────────────────────────────────
scrape_configs:

  # 1. Prometheus monitors itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 2. Our ML FastAPI application
  - job_name: 'ml_fastapi_app'
    metrics_path: '/metrics'     # endpoint that exposes metrics
    scrape_interval: 10s          # scrape every 10s for real-time demo
    static_configs:
      - targets: ['localhost:8000']  # FastAPI running on port 8000
    # Optional: add labels for easy filtering in Grafana
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'ml-model-server'
