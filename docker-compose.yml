# =============================================================
#  Docker Compose
#  File: docker-compose.yml
#  Purpose: Run Prometheus + Grafana together with one command
#
#  Usage:
#    docker-compose up -d
#    Then start FastAPI separately: python app.py
# =============================================================

version: '3.8'

services:

  # ── Prometheus ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: practical10_prometheus
    ports:
      - "9090:9090"
    volumes:
      # Mount our config files into the container
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    # Allow Prometheus to reach the host machine (where FastAPI runs)
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Grafana ─────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: practical10_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      # Auto-provision datasource and dashboard
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/ml_monitoring.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:

# NOTE for Windows Users:
# In prometheus.yml, the FastAPI target is 'localhost:8000'
# Docker cannot reach Windows localhost by default.
# Change it to 'host.docker.internal:8000' when using Docker on Windows.
